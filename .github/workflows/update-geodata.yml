name: Update Geodata
# Fetches, processes, and uploads all geodata sources to Cloudflare R2

on:
  schedule:
    - cron: "0 0 1 */3 *"  # quarterly — 1st of Jan, Apr, Jul, Oct
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gdal-bin libgdal-dev
          npm install --global mapshaper
          mapshaper --version

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        run: python -m pipeline.run
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
